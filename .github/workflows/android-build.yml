name: Android Build (APK + AAB)

# Builds a signed release APK and AAB for Zuzu Logic Park.
# CI focuses on fast, stable build tasks only. The on-device launch
# verification is a local pre-release step described in the README.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35 and Build Tools 35.0.0
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm install

      - name: Align Expo dependencies
        run: npx expo install --fix || true

      - name: Run Expo Doctor
        run: npx expo-doctor || true

      - name: Check Expo dependency versions
        run: npx expo install --check || true

      - name: Prebuild Android project (clean)
        run: npx expo prebuild --platform android --clean

      - name: Force API level 35 (Google Play requirement)
        run: |
          {
            echo ""
            echo "# Google Play requires targeting API level 35+ and 16 KB page support"
            echo "android.compileSdkVersion=35"
            echo "android.targetSdkVersion=35"
            echo "android.buildToolsVersion=35.0.0"
          } >> android/gradle.properties
          echo "SDK settings now in android/gradle.properties:"
          grep -E "SdkVersion|buildToolsVersion" android/gradle.properties

      - name: Decode release keystore from secret
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Configure release signing
        run: python3 .github/scripts/configure-signing.py

      - name: Build signed release APK
        working-directory: android
        env:
          ZUZU_STORE_FILE: release.keystore
          ZUZU_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ZUZU_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ZUZU_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify APK is release-signed (not debug)
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          APKSIGNER=$(find "$ANDROID_HOME/build-tools/35.0.0" -name apksigner | head -n1)
          echo "Using: $APKSIGNER"
          CERTS=$("$APKSIGNER" verify --print-certs "$APK")
          echo "$CERTS"
          if echo "$CERTS" | grep -qi "Android Debug"; then
            echo "::error::APK is signed with the DEBUG key. Aborting."
            exit 1
          fi
          if ! echo "$CERTS" | grep -q "Zuzu Logic Park"; then
            echo "::error::APK is not signed with the Zuzu release key. Aborting."
            exit 1
          fi
          echo "OK: APK is signed with the Zuzu Logic Park release key."

      - name: Verify targetSdkVersion is 35 (Google Play requirement)
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          AAPT=$(find "$ANDROID_HOME/build-tools/35.0.0" -name aapt | head -n1)
          if [ -z "$AAPT" ]; then
            AAPT=$(find "$ANDROID_HOME/build-tools/35.0.0" -name aapt2 | head -n1)
          fi
          echo "Using: $AAPT"
          BADGING=$("$AAPT" dump badging "$APK")
          echo "$BADGING" | grep -E "targetSdkVersion|sdkVersion" || true
          TARGET=$(echo "$BADGING" | sed -n "s/.*targetSdkVersion:'\([0-9]*\)'.*/\1/p")
          echo "Detected targetSdkVersion: $TARGET"
          if [ "$TARGET" -lt 35 ]; then
            echo "::error::targetSdkVersion is $TARGET, but Google Play requires >= 35. Aborting."
            exit 1
          fi
          echo "OK: targetSdkVersion is $TARGET (>= 35)."

      - name: Build signed release AAB
        working-directory: android
        env:
          ZUZU_STORE_FILE: release.keystore
          ZUZU_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ZUZU_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ZUZU_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Collect artifacts
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk zuzu-logic-park-release.apk
          cp android/app/build/outputs/bundle/release/app-release.aab zuzu-logic-park-release.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zuzu-logic-park-release-apk
          path: zuzu-logic-park-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: zuzu-logic-park-release-aab
          path: zuzu-logic-park-release.aab
