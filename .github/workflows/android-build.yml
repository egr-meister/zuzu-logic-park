name: Android Build (APK + AAB)

# Builds a signed release APK and AAB for Zuzu Logic Park.
# CI focuses on fast, stable build tasks only. The on-device launch
# verification is a local pre-release step described in the README.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35 and Build Tools 35.0.0
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm install

      - name: Align Expo dependencies
        run: npx expo install --fix

      - name: Run Expo Doctor
        run: npx expo-doctor || true

      - name: Check Expo dependency versions
        run: npx expo install --check || true

      - name: Prebuild Android project (clean)
        run: npx expo prebuild --platform android --clean

      - name: Decode release keystore from secret
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Configure signing (gradle.properties)
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          {
            echo "ZUZU_UPLOAD_STORE_FILE=release.keystore"
            echo "ZUZU_UPLOAD_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "ZUZU_UPLOAD_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "ZUZU_UPLOAD_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> android/gradle.properties

      - name: Apply release signing config to build.gradle
        run: |
          APP_GRADLE=android/app/build.gradle
          python3 - "$APP_GRADLE" <<'PY'
          import re, sys
          path = sys.argv[1]
          with open(path, "r") as f:
              gradle = f.read()

          signing_block = '''
            signingConfigs {
                release {
                    if (project.hasProperty('ZUZU_UPLOAD_STORE_FILE')) {
                        storeFile file(ZUZU_UPLOAD_STORE_FILE)
                        storePassword ZUZU_UPLOAD_STORE_PASSWORD
                        keyAlias ZUZU_UPLOAD_KEY_ALIAS
                        keyPassword ZUZU_UPLOAD_KEY_PASSWORD
                    }
                }
            }
        '''

          # Insert the signingConfigs block right after "android {" once.
          if "ZUZU_UPLOAD_STORE_FILE" not in gradle:
              gradle = re.sub(r"android\s*\{", "android {\n" + signing_block, gradle, count=1)

          # Point the release buildType at the release signing config.
          gradle = gradle.replace(
              "signingConfig signingConfigs.debug\n            minifyEnabled",
              "signingConfig signingConfigs.release\n            minifyEnabled",
          )
          # Fallback: if the release buildType still references debug, switch it.
          gradle = re.sub(
              r"(release\s*\{[^}]*?)signingConfig signingConfigs\.debug",
              r"\1signingConfig signingConfigs.release",
              gradle,
              flags=re.S,
          )

          with open(path, "w") as f:
              f.write(gradle)
          print("Patched", path)
          PY

      - name: Build signed release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Build signed release AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon

      - name: Rename artifacts
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk zuzu-logic-park-release.apk
          cp android/app/build/outputs/bundle/release/app-release.aab zuzu-logic-park-release.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zuzu-logic-park-release-apk
          path: zuzu-logic-park-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: zuzu-logic-park-release-aab
          path: zuzu-logic-park-release.aab
